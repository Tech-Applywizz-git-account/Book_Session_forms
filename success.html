<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Success | Wage Trail</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%231e3a8a%22/><circle cx=%2285%22 cy=%2215%22 r=%2212%22 fill=%22%23fbbf24%22/><text x=%2250%%22 y=%2250%%22 dominant-baseline=%22central%22 text-anchor=%22middle%22 fill=%22white%22 font-family=%22sans-serif%22 font-weight=%22bold%22 font-size=%2240%22>H1B</text></svg>">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .success-content { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="background-blobs"></div>

    <main class="container">
        <section class="booking-card success-content">
            <!-- 🏢 BRAND LOGO -->
            <div class="logo-area">
                <div class="h1b-logo">H1-B</div>
                <div class="logo-text">
                    <span class="wage">Wage</span>
                    <span class="trail">Trail</span>
                </div>
            </div>

            <!-- ✅ Success State -->
            <div id="successState" style="text-align: center;">
                <div class="success-icon" style="margin-bottom: 24px; background: #f0fdf4; color: #16a34a; width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="width: 32px; height: 32px;">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </div>
                
                <h1 style="font-size: 1.8rem; margin-bottom: 12px; color: var(--primary-blue);">Payment Confirmed!</h1>
                <p style="color: var(--text-muted); font-size: 1rem; margin-bottom: 32px;">Your session is secured. Please pick your time slot below.</p>

                <div class="teams-link-box" style="background: #f8fafc; border: 1px solid var(--border-color); border-radius: 16px; padding: 24px; text-align: left;">
                    <div id="bookingSummary" style="margin-bottom: 20px;">
                        <p style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700;">Confirmed For:</p>
                        <p id="displayUserName" style="font-weight: 700; font-size: 1.2rem; color: var(--primary-blue);">User</p>
                        <p id="displayUserEmail" style="font-size: 0.9rem; color: var(--text-muted); margin-top: 2px;">Email Loading...</p>
                    </div>
                    
                    <a href="https://outlook.office.com/book/Book_Session@Wagetrail.com/" target="_blank" class="teams-btn" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 12px; padding: 16px; font-weight: 600; background: var(--primary-blue); color: white; text-decoration: none; border-radius: 12px;">
                        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9v-2h2v2zm0-4H9V7h2v5z"/>
                        </svg>
                        Schedule on Microsoft Teams
                    </a>
                </div>
                
                <!-- 🔄 REDIRECTION STATUS -->
                <div style="margin-top: 30px; color: var(--primary-blue); font-weight: 600; font-size: 0.9rem;">
                   Opening scheduler automatically in 3 seconds...
                </div>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const bookingData = JSON.parse(localStorage.getItem('bookingData'));
            
            if (bookingData) {
                document.getElementById('displayUserName').textContent = bookingData.name || 'User';
                document.getElementById('displayUserEmail').textContent = bookingData.email || 'Email';
            }

            // 🏁 AUTO-REDIRECT TO TEAMS AFTER 3 SECONDS
            setTimeout(() => {
                window.location.href = 'https://outlook.office.com/book/Book_Session@Wagetrail.com/';
            }, 3000);
        });
    </script>
</body>
</html>
