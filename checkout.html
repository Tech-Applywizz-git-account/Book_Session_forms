<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout | Wage Trail</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%231e3a8a%22/><circle cx=%2285%22 cy=%2215%22 r=%2212%22 fill=%22%23fbbf24%22/><text x=%2250%%22 y=%2250%%22 dominant-baseline=%22central%22 text-anchor=%22middle%22 fill=%22white%22 font-family=%22sans-serif%22 font-weight=%22bold%22 font-size=%2240%22>H1B</text></svg>">
    
    <!-- 💳 Official PayPal SDK (LIVE) -->
    <script src="https://www.paypal.com/sdk/js?client-id=AZFo-XJQyEtj9QC0iiC2TB21C9KNNEZ4Y9PG9EJaTKF2jKlzz9DCHm8n20Hl2gm9YeBmiD1hyhSmHDN-&currency=USD"></script>
</head>
<body>
    <div class="background-blobs"></div>

    <main class="container">
        <!-- 🏢 BRAND LOGO -->
        <div class="logo-area">
            <div class="h1b-logo">H1-B</div>
            <div class="logo-text">
                <span class="wage">Wage</span>
                <span class="trail">Trail</span>
            </div>
        </div>

        <section class="booking-card">
            <div class="card-header" style="margin-bottom: 30px;">
                <h1 style="font-size: 1.6rem; color: var(--primary-blue);">Complete Your Booking</h1>
                <p style="font-size: 1rem; color: var(--text-muted); font-weight: 500;">
                    Make the payment to book the session for <span id="userName" style="color: var(--primary-blue); font-weight: 700;">User</span>.
                </p>
            </div>

            <!-- 💳 PayPal Button Container -->
            <div id="paypal-button-container" style="min-height: 200px; position: relative; z-index: 1;"></div>
            
            <div style="margin-top: 30px; text-align: center;">
                <p style="font-size: 0.85rem; color: var(--text-muted);">
                    Secured by PayPal. Instant confirmation.
                </p>
            </div>
        </section>
    </main>

    <script src="checkout.js"></script>
</body>
</html>
