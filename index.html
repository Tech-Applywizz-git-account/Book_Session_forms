<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulting | Wage Trail</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/emailjs.min.js"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%23223354%22/><circle cx=%2285%22 cy=%2215%22 r=%2212%22 fill=%22%23e8a200%22/><text x=%2250%%22 y=%2250%%22 dominant-baseline=%22central%22 text-anchor=%22middle%22 fill=%22white%22 font-family=%22sans-serif%22 font-weight=%22bold%22 font-size=%2240%22>H1B</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-blobs"></div>

    <main class="container">
        <!-- 🏢 BRAND LOGO -->
        <div class="logo-area">
            <div class="h1b-logo">H1-B</div>
            <div class="logo-text">
                <span class="wage">Wage</span>
                <span class="trail">Trail</span>
            </div>
        </div>

        <div class="card-header">
            <h1>Book Your Session</h1>
            <p>Fill in the details below to secure your one-on-one consultation.</p>
            <div class="pricing-container">
                <span class="old-price">$100.00</span>
                <span class="new-price">$34.99</span>
            </div>
            <div class="discount-highlight">🔥 65% OFF for first 100 slots!</div>
        </div>

        <form id="bookingForm" class="form-grid">
            <div class="input-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="John Doe" required>
            </div>

            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="john@example.com"
                    pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{3,4}$" required>
                <span id="emailError" class="error-text">Invalid Email Address (Must be .com, .net, etc.)</span>
            </div>

            <div class="input-group">
                <label for="mobile">Mobile Number</label>
                <div class="mobile-input-wrapper">
                    <select id="countryCode" name="countryCode" required>
                        <option value="+1" selected>🇺🇸 +1</option>
                        <option value="+91">🇮🇳 +91</option>
                        <option value="+44">🇬🇧 +44</option>
                        <option value="+1">🇨🇦 +1</option>
                        <option value="+61">🇦🇺 +61</option>
                        <option value="+971">🇦🇪 +971</option>
                        <option value="+65">🇸🇬 +65</option>
                        <option value="+353">🇮🇪 +353</option>
                        <option value="+49">🇩🇪 +49</option>
                        <option value="+33">🇫🇷 +33</option>
                        <option value="+31">🇳🇱 +31</option>
                        <option value="+41">🇨🇭 +41</option>
                        <option value="+39">🇮🇹 +39</option>
                        <option value="+34">🇪🇸 +34</option>
                        <option value="+46">🇸🇪 +46</option>
                        <option value="+47">🇳🇴 +47</option>
                        <option value="+60">🇲🇾 +60</option>
                        <option value="+62">🇮🇩 +62</option>
                        <option value="+66">🇹🇭 +66</option>
                        <option value="+81">🇯🇵 +81</option>
                        <option value="+82">🇰🇷 +82</option>
                        <option value="+86">🇨🇳 +86</option>
                        <option value="+92">🇵🇰 +92</option>
                        <option value="+880">🇧🇩 +880</option>
                        <option value="+94">🇱🇰 +94</option>
                        <option value="+977">🇳🇵 +977</option>
                        <option value="+966">🇸🇦 +966</option>
                        <option value="+974">🇶🇦 +974</option>
                        <option value="+965">🇰🇼 +965</option>
                        <option value="+968">🇴🇲 +968</option>
                        <option value="+20">🇪🇬 +20</option>
                        <option value="+27">🇿🇦 +27</option>
                        <option value="+55">🇧🇷 +55</option>
                        <option value="+52">🇲🇽 +52</option>
                        <option value="+64">🇳🇿 +64</option>
                    </select>
                    <input type="tel" id="mobile" name="mobile" placeholder="9876543210" pattern="[0-9]{7,15}" required
                        title="Please enter a valid phone number (7-15 digits)">
                </div>
            </div>

            <button type="submit" class="submit-btn" id="bookBtn">
                <span>Book Session</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </button>
        </form>
    </main>

    <script src="script.js"></script>
</body>

</html>
