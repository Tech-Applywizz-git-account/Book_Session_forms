<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulting | Wage Trail</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/emailjs.min.js"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%231e3a8a%22/><circle cx=%2285%22 cy=%2215%22 r=%2212%22 fill=%22%23fbbf24%22/><text x=%2250%%22 y=%2250%%22 dominant-baseline=%22central%22 text-anchor=%22middle%22 fill=%22white%22 font-family=%22sans-serif%22 font-weight=%22bold%22 font-size=%2240%22>H1B</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- 💳 Official PayPal SDK -->
    <script src="https://www.paypal.com/sdk/js?client-id=YOUR_PAYPAL_CLIENT_ID&currency=USD"></script>
</head>

<body>
    <div class="background-blobs"></div>

    <main class="container">
        <!-- 🏢 BRAND LOGO -->
        <div class="logo-area">
            <div class="h1b-logo">H1-B</div>
            <div class="logo-text">
                <span class="wage">Wage</span>
                <span class="trail">Trail</span>
            </div>
        </div>

        <div class="card-header">
            <h1 style="font-size: 1.6rem;">Book Your Session</h1>
            <p style="font-size: 0.9rem;">Fill in your details and pay securely via PayPal to receive your Teams link.</p>
        </div>

        <form id="bookingForm" class="form-grid">
            <div class="input-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="John Doe" required>
            </div>

            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="john@example.com" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{3,4}$" required>
                <span id="emailError" class="error-text">Invalid Email Address (Must be .com, .net, etc.)</span>
            </div>

            <div class="input-group">
                <label for="mobile">Mobile Number</label>
                <div class="mobile-input-wrapper">
                    <select id="countryCode" name="countryCode" required>
                        <option value="+91" selected>🇮🇳 +91 (India)</option>
                        <option value="+1">🇺🇸 +1 (USA)</option>
                        <option value="+44">🇬🇧 +44 (UK)</option>
                        <option value="+1">🇨🇦 +1 (Canada)</option>
                        <option value="+61">🇦🇺 +61 (Australia)</option>
                        <option value="+971">🇦🇪 +971 (UAE)</option>
                        <option value="+65">🇸🇬 +65 (Singapore)</option>
                        <option value="+353">🇮🇪 +353 (Ireland)</option>
                        <option value="+49">🇩🇪 +49 (Germany)</option>
                        <option value="+33">🇫🇷 +33 (France)</option>
                        <option value="+31">🇳🇱 +31 (Netherlands)</option>
                        <option value="+41">🇨🇭 +41 (Switzerland)</option>
                        <option value="+39">🇮🇹 +39 (Italy)</option>
                        <option value="+34">🇪🇸 +34 (Spain)</option>
                        <option value="+46">🇸🇪 +46 (Sweden)</option>
                        <option value="+47">🇳🇴 +47 (Norway)</option>
                        <option value="+60">🇲🇾 +60 (Malaysia)</option>
                        <option value="+62">🇮🇩 +62 (Indonesia)</option>
                        <option value="+66">🇹🇭 +66 (Thailand)</option>
                        <option value="+81">🇯🇵 +81 (Japan)</option>
                        <option value="+82">🇰🇷 +82 (S. Korea)</option>
                        <option value="+86">🇨🇳 +86 (China)</option>
                        <option value="+92">🇵🇰 +92 (Pakistan)</option>
                        <option value="+880">🇧🇩 +880 (Bangladesh)</option>
                        <option value="+94">🇱🇰 +94 (Sri Lanka)</option>
                        <option value="+977">🇳🇵 +977 (Nepal)</option>
                        <option value="+966">🇸🇦 +966 (Saudi Arabia)</option>
                        <option value="+974">🇶🇦 +974 (Qatar)</option>
                        <option value="+965">🇰🇼 +965 (Kuwait)</option>
                        <option value="+968">🇴🇲 +968 (Oman)</option>
                        <option value="+20">🇪🇬 +20 (Egypt)</option>
                        <option value="+27">🇿🇦 +27 (S. Africa)</option>
                        <option value="+55">🇧🇷 +55 (Brazil)</option>
                        <option value="+52">🇲🇽 +52 (Mexico)</option>
                        <option value="+64">🇳🇿 +64 (New Zealand)</option>
                    </select>
                    <input type="tel" id="mobile" name="mobile" placeholder="9876543210" pattern="[0-9]{7,15}" required title="Please enter a valid phone number (7-15 digits)">
                </div>
            </div>

            <!-- 💳 PayPal Button Container -->
            <div id="paypal-button-container" style="margin-top: 15px; position: relative; z-index: 1;"></div>
        </form>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
